<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Solicitud de Creación de Cliente | VALEPAC</title>
  <meta name="description" content="Formulario de solicitud de creación de clientes VALEPAC" />
  <meta name="theme-color" content="#0057B8" />

  <link rel="stylesheet" href="/clientes/styles.css" />
  <link rel="manifest" href="/clientes/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/clientes/icon-192.png" />
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="title">
      <header class="header">
        <div class="logo" aria-hidden="true">V</div>
        <div>
          <p class="eyebrow">VALEPAC</p>
          <h1 id="title">Solicitud de Creación de Cliente</h1>
          <p class="subtitle">Complete los datos de su empresa. Recibiremos la solicitud para revisión.</p>
        </div>
      </header>

      <form id="clienteForm" novalidate>
        <input type="text" name="empresa_web" class="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" />

        <div class="grid">
          <div class="field">
            <label for="rut_empresa">RUT empresa <span>*</span></label>
            <input id="rut_empresa" name="rut_empresa" type="text" inputmode="text" autocomplete="off" placeholder="76.123.456-7" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="razon_social">Razón social <span>*</span></label>
            <input id="razon_social" name="razon_social" type="text" autocomplete="organization" placeholder="Nombre legal de la empresa" required />
            <small class="error"></small>
          </div>

          <div class="field full">
            <label for="giro">Giro <span>*</span></label>
            <input id="giro" name="giro" type="text" placeholder="Actividad comercial" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="telefono">Teléfono <span>*</span></label>
            <input id="telefono" name="telefono" type="tel" inputmode="tel" autocomplete="tel" placeholder="+56912345678" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="mail">Mail <span>*</span></label>
            <input id="mail" name="mail" type="email" inputmode="email" autocomplete="email" placeholder="correo@empresa.cl" required />
            <small class="error"></small>
          </div>

          <div class="field full">
            <label for="direccion">Dirección <span>*</span></label>
            <input id="direccion" name="direccion" type="text" autocomplete="street-address" placeholder="Calle, número, oficina o referencia" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="comuna">Comuna <span>*</span></label>
            <input id="comuna" name="comuna" type="text" autocomplete="address-level2" placeholder="Comuna" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="nombre_contacto">Nombre contacto <span>*</span></label>
            <input id="nombre_contacto" name="nombre_contacto" type="text" autocomplete="name" placeholder="Nombre y apellido" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="tipo_vehiculo">Tipo de vehículo <span>*</span></label>
            <input id="tipo_vehiculo" name="tipo_vehiculo" type="text" placeholder="Ej: Camión" required />
            <small class="error"></small>
          </div>

          <div class="field">
            <label for="patente">Patente <span>*</span></label>
            <input id="patente" name="patente" type="text" inputmode="text" autocomplete="off" placeholder="Ej: ABCD12" required />
            <small class="error"></small>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-head compact">
          <p><strong>* Si necesitas cambiar tu boleta por factura, adjunta una fotografía clara de la boleta.</strong></p>
        </div>

        <input type="hidden" name="tipo_solicitud" value="Creación de cliente / cambio boleta por factura" />
        <input type="hidden" name="folio_dte" value="" />

        <div class="grid">
          <div class="field full">
            <label for="observacion">Observación</label>
            <textarea id="observacion" name="observacion" rows="3" placeholder="Detalle breve de la solicitud o cambio requerido"></textarea>
            <small class="error"></small>
          </div>

          <div class="field full">
            <label for="respaldo_foto">Fotografía de respaldo</label>
            <input id="respaldo_foto" name="respaldo_foto" type="file" accept="image/*" capture="environment" />
            <small id="fileStatus" class="file-status"></small>
            <small class="error"></small>
          </div>
        </div>

        <button id="submitBtn" type="submit">Enviar solicitud</button>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="/clientes/app.js" defer></script>
</body>
</html>
